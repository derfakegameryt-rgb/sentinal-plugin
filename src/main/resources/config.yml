# Sentinel configuration
debug: false        # set true to enable [DEBUG] log lines for diagnostics
language: en        # message language: "en" (default) or "de". Any key missing from a
                    # translation falls back to English, so partial packs are safe.
exempt: []          # list of UUIDs that can never be punished
report:
  cooldown-seconds: 30  # how long a non-staff player must wait between /report uses (0 = disabled)
reasons:            # the 5 presets shown in the Reason GUI
  - Hacking
  - Spam
  - Toxicity
  - Advertising
  - Griefing

chat:
  slowmode-seconds: 0          # 0 = off; minimum gap between a player's messages
  anti-spam:
    enabled: true
    max-repeats: 3             # blocked after the same message this many times in a row
  anti-advertising:
    enabled: true
    whitelist: []              # domains/IPs that are allowed (substring match)
  word-filter:
    enabled: true
    mode: block                # block | censor
    words: []                  # words to block/censor (case-insensitive)
  caps-filter:
    enabled: true
    min-length: 8              # ignore short messages
    max-uppercase-ratio: 0.7   # block/censor if more than this fraction of letters are uppercase
    mode: censor               # "block" or "censor" (censor = lowercase the message)
  flood-filter:
    enabled: true
    max-run: 5                 # block if the same character repeats more than this many times in a row
warn-actions:            # warns count -> action: "<kick|ban|tempban|mute|tempmute> [duration] <reason>"
  3: "tempban 1d Reached 3 warnings"
  5: "ban Reached 5 warnings"
warns:
  expiry-days: 7            # warnings older than this stop counting and are deleted (0 = keep forever)
gui:
  sound: true
  sound-name: UI_BUTTON_CLICK
logging:
  retention-days: 30          # delete chat/command log entries older than this (0 = keep forever)
templates:        # quick punishments: "<type> [duration] <reason>" — the 5 most common offences
  - "ban Hacking / cheating"                       # cheat clients — permanent
  - "tempban 30d Advertising"                      # promoting other servers — 30 days
  - "tempban 14d Griefing"                         # destroying/stealing builds — 14 days
  - "tempmute 7d Hate speech / discrimination"     # serious chat abuse — 7 day mute
  - "tempmute 1h Spamming"                         # chat flooding — 1 hour mute

backup:
  keep: 5   # how many backup zips to retain

# Appeals: a public URL shown on the ban screen so banned players know where to appeal
# (banned players cannot run commands). Leave blank to show no appeal line.
appeals:
  url: ""
  cooldown-seconds: 60  # how long a non-staff player must wait between /appeal uses (0 = disabled)

# Discord webhook: posts punishments and reports to a channel via an incoming webhook.
# No bot/token needed — create one under Channel Settings -> Integrations -> Webhooks
# and paste its URL here. Leave enabled false (or url blank) to disable.
discord:
  enabled: false
  webhook-url: ""
  username: "Sentinel"   # name the messages are posted under

# Scheduled console commands. Each entry needs a "do" plus either "every" (interval) or "at" (daily HH:mm).
scheduled-tasks: []
#  - { every: "2h", do: "say Remember to vote!" }
#  - { at: "04:00", do: "restart 60s" }
