name: Release

# Builds the shaded jar from this private source repo when a v* tag is pushed,
# then publishes the GitHub Release (with the jar attached) to the PUBLIC repo
# so downloads stay where users already expect them.
#
# One-time setup: create a fine-grained or classic PAT with `contents: write`
# on derfakegameryt-rgb/sentinal-plugin and add it as the repo secret
# RELEASE_TOKEN (Settings -> Secrets and variables -> Actions). Without it the
# job fails fast on the publish step.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)publish, e.g. v2.7.0'
        required: true

permissions:
  contents: read

env:
  PUBLIC_REPO: derfakegameryt-rgb/sentinal-plugin

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shaded jar
        run: ./gradlew --no-daemon build

      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::RELEASE_TOKEN secret is not set — cannot publish to $PUBLIC_REPO"
            exit 1
          fi
          TAG="${{ steps.tag.outputs.name }}"
          gh release create "$TAG" \
            --repo "$PUBLIC_REPO" \
            --title "Sentinel $TAG" \
            --generate-notes \
            build/libs/*.jar
